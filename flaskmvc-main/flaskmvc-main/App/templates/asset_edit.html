<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Asset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h3>Edit Asset</h3>

<div class="card p-4">

    <label>Asset ID</label>
    <input id="assetId" class="form-control mb-2" value="{{ asset.asset_id }}" disabled>

    <label>Description</label>
    <input id="description" class="form-control mb-2" value="{{ asset.description }}">

    <label>Brand</label>
    <input id="brand" class="form-control mb-2" value="{{ asset.brand }}">

    <label>Model</label>
    <input id="model" class="form-control mb-2" value="{{ asset.model }}">

    <label>Serial Number</label>
    <input id="serial_number" class="form-control mb-2" value="{{ asset.serial_number }}">

    <label>Notes</label>
    <textarea id="notes" class="form-control mb-3">{{ asset.notes }}</textarea>

    <div class="d-flex justify-content-end gap-2 mt-3">
        <button class="btn btn-secondary" onclick="history.back()">Cancel</button>
        <button class="btn btn-primary" onclick="updateAsset()">Update</button>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/inventory.js') }}"></script>


</body>
</html>
